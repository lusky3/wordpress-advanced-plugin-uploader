name: WordPress Plugin Check

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'assets/**'
      - 'readme.txt'
  pull_request:
    branches: [main]
    paths:
      - '**.php'
      - 'assets/**'
      - 'readme.txt'

permissions:
  contents: read

jobs:
  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: wordpress/plugin-check-action@v1
