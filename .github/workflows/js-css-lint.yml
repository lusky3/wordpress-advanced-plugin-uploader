name: JS & CSS Lint

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - '.stylelintrc*'
  pull_request:
    branches: [main]
    paths:
      - 'assets/**'
      - '.stylelintrc*'

permissions:
  contents: read

jobs:
  oxlint:
    name: OxLint (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oxc-project/oxlint-action@v0
        with:
          args: assets/js/

  stylelint:
    name: Stylelint (CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-stylelint-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-stylelint-

      - name: Install Stylelint
        run: npm install --no-save stylelint @wordpress/stylelint-config

      - name: Run Stylelint
        run: npx stylelint "assets/css/**/*.css"
