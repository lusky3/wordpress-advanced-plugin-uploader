name: JS & CSS Lint

on:
  push:
    branches: [main]
    paths: ['assets/**', '.eslintrc*', '.stylelintrc*', 'package.json']
  pull_request:
    branches: [main]
    paths: ['assets/**', '.eslintrc*', '.stylelintrc*', 'package.json']

permissions:
  contents: read

jobs:
  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run oxlint
        uses: oxc-project/oxlint-action@v0
        with:
          args: assets/js/

  stylelint:
    name: Stylelint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Stylelint with WordPress config
        run: npm install --no-save stylelint @wordpress/stylelint-config

      - name: Run Stylelint
        run: npx stylelint 'assets/css/**/*.css'
