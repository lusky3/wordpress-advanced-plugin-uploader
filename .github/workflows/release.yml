name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Validate version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_FILE=$(find . -maxdepth 1 -name '*.php' -exec grep -l 'Plugin Name:' {} \; | head -1)
          if [ -z "$PLUGIN_FILE" ]; then
            echo "::error::No main plugin file found"
            exit 1
          fi
          FILE_VERSION=$(grep -oP 'Version:\s*\K[0-9.]+' "$PLUGIN_FILE")
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match plugin version ($FILE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader 2>/dev/null || true

      - name: Build ZIP
        run: |
          PLUGIN_SLUG=$(basename "$GITHUB_REPOSITORY")
          mkdir -p "$PLUGIN_SLUG"
          rsync -a --exclude="$PLUGIN_SLUG" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.kiro' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='vendor/bin' \
            . "$PLUGIN_SLUG/"
          zip -r "${PLUGIN_SLUG}.zip" "$PLUGIN_SLUG"
          echo "ZIP_FILE=${PLUGIN_SLUG}.zip" >> "$GITHUB_ENV"
          echo "PLUGIN_SLUG=${PLUGIN_SLUG}" >> "$GITHUB_ENV"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ env.PLUGIN_SLUG }}.spdx.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
          generate_release_notes: true
