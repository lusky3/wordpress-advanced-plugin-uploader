name: PHP Lint & Standards

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.*'
      - 'phpcs.xml*'
      - 'phpstan.neon*'
  pull_request:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.*'
      - 'phpcs.xml*'
      - 'phpstan.neon*'

permissions:
  contents: read

jobs:
  php-syntax:
    name: PHP Syntax (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Check PHP syntax
        run: find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' | xargs -n1 php -l

  phpcs:
    name: PHPCS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: cs2pr, phpcs
          coverage: none

      - name: Install WPCS
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer

      - name: Run PHPCS
        run: |
          if [ -f phpcs.xml ] || [ -f phpcs.xml.dist ]; then
            phpcs --report=checkstyle -q | cs2pr
          else
            phpcs --standard=WordPress --extensions=php --ignore=vendor/,node_modules/ --report=checkstyle -q . | cs2pr
          fi

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    if: hashFiles('phpstan.neon') != ''
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          fi
          composer global require phpstan/phpstan szepeviktor/phpstan-wordpress php-stubs/wordpress-stubs

      - name: Run PHPStan
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            ~/.composer/vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress
          fi
